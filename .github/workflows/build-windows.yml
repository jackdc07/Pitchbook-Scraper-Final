name: Build Windows app

# Builds PitchBookScraper.exe on a Windows machine in the cloud (free for your
# repo). Run it from the GitHub "Actions" tab, or it runs automatically when you
# push a version tag like v1.0.0 (which also attaches the .exe to a Release).

on:
  workflow_dispatch:        # lets you click "Run workflow" in the Actions tab
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build the .exe
        run: pyinstaller --onefile --windowed --name PitchBookScraper app.py

      - name: Upload the .exe as a downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: PitchBookScraper-windows
          path: dist/PitchBookScraper.exe

      - name: Attach the .exe to the Release (on version tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PitchBookScraper.exe
